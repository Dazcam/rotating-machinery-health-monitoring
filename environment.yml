name: rmhm
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # Data
  - numpy=2.0
  - pandas=2.2
  - scipy=1.13
  # Machine learning
  - scikit-learn=1.5
  # Deep learning
  - pytorch=2.4
  - cpuonly                        # remove this line and add pytorch-cuda=12.1 for GPU
  # Visualisation
  - matplotlib=3.9
  - seaborn=0.13
  # Notebooks
  - jupyter
  - ipykernel
  # Dashboard
  - pip
  - pip:
    - streamlit==1.46.0
    - nbmake==1.5.4               # notebook testing via pytest
